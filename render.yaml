services:
  - type: web
    name: market-scout
    runtime: python
    plan: free           # upgrade to starter ($7/mo) for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: chainlit run app.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: TAVILY_API_KEY
        sync: false      # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false      # set manually in Render dashboard
      - key: MARKET_SCOUT_OUTPUT_DIR
        value: /tmp/market_scout_outputs
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: market-scout-data
      mountPath: /tmp/market_scout_outputs
      sizeGB: 1          # persistent disk — keeps history/excel/pdfs across restarts
